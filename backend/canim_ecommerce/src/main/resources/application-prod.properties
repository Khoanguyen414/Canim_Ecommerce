# Production profile â€” set secrets via environment variables (see .env.example).

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/canim_ecommerce}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:canim_ecommerce}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:canim_ecommerce}
spring.flyway.user=${MYSQL_USER:root}
spring.flyway.password=${MYSQL_PASSWORD}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

security.jwt.secret=${JWT_SECRET}
security.jwt.access-token-expiration-minutes=${JWT_ACCESS_EXPIRATION:10}
security.jwt.refresh-token-expiration-days=${JWT_REFRESH_EXPIRATION:1}

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:https://*.pages.dev,https://*.vercel.app}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

app.storage.mode=${APP_STORAGE_MODE:cloudinary}
app.storage.public-url=${APP_STORAGE_PUBLIC_URL:}

google.oauth.client-id=${GOOGLE_CLIENT_ID:${GOOGLE_OAUTH_CLIENT_ID:}}
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}

app.redis.enabled=${REDIS_ENABLED:true}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=3s
spring.data.redis.lettuce.validate-connection=false

payment.environment=${PAYMENT_ENV:sandbox}
payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
payment.vnpay.return-url=${VNPAY_RETURN_URL:}
payment.vnpay.ipn-url=${VNPAY_IPN_URL:}
payment.momo.partner-code=${MOMO_PARTNER_CODE:}
payment.momo.access-key=${MOMO_ACCESS_KEY:}
payment.momo.secret-key=${MOMO_SECRET_KEY:}
payment.momo.return-url=${MOMO_RETURN_URL:}
payment.momo.notify-url=${MOMO_NOTIFY_URL:}

payment.personal-qr.momo.account-name=${PERSONAL_QR_ACCOUNT_NAME:${MOMO_QR_ACCOUNT_NAME:}}
payment.personal-qr.momo.phone=${PERSONAL_QR_MOMO_PHONE:${MOMO_QR_PHONE:}}
payment.personal-qr.momo.wallet-account-number=${PERSONAL_QR_ACCOUNT_NO:${MOMO_QR_WALLET_ACCOUNT:}}
payment.personal-qr.momo.vietqr-bank-bin=${PERSONAL_QR_BANK_CODE:${MOMO_VIETQR_BANK_BIN:970454}}
payment.personal-qr.vnpay.account-name=${VNPAY_QR_ACCOUNT_NAME:}
payment.personal-qr.vnpay.account-number=${PERSONAL_QR_ACCOUNT_NO:${VNPAY_QR_ACCOUNT_NUMBER:}}
payment.personal-qr.vnpay.bank-name=${VNPAY_QR_BANK_NAME:Vietcombank}
payment.personal-qr.vnpay.vietqr-acquirer-id=${VNPAY_VIETQR_ACQ_ID:970436}

app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
