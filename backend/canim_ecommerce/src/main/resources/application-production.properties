# Kích hoạt: spring.profiles.active=production
# Hoặc: PAYMENT_ENV=production (xem application.properties)

payment.environment=production

# URL production (có thể ghi đè bằng biến môi trường)
payment.vnpay.pay-url=https://pay.vnpayment.vn/paymentv2/vpcpay.html
payment.momo.endpoint=https://payment.momo.vn/v2/gateway/api/create

# BẮT BUỘC khi go-live — thay bằng domain HTTPS công khai của bạn:
# payment.vnpay.return-url=https://your-domain.com/payment/vnpay-return
# payment.vnpay.ipn-url=https://api.your-domain.com/canim_ecommerce/payments/vnpay/ipn
# payment.momo.return-url=https://your-domain.com/payment/momo-return
# payment.momo.notify-url=https://api.your-domain.com/canim_ecommerce/payments/momo/notify
