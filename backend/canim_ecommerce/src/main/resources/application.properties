spring.application.name=canim_ecommerce

app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

server.port=8000
server.servlet.context-path=/canim_ecommerce

spring.datasource.url=jdbc:mysql://localhost:3307/canim_ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.url=jdbc:mysql://localhost:3307/canim_ecommerce
spring.flyway.user=root
spring.flyway.password=${MYSQL_PASSWORD:root}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
# Ignore already-applied migrations that are missing from the local repository.
spring.flyway.ignore-migration-patterns=*:missing

security.jwt.secret='3939059c8f06d61a8d434092f778c92e220ef13878cb7f3c1936976f879de409'
security.jwt.access-token-expiration-minutes=10
security.jwt.refresh-token-expiration-days=1

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

cloudinary.cloud-name=dtuuedw81
cloudinary.api-key=226319246797562
cloudinary.api-secret=WtUUyKYydS9i8bLORlgzuaTaCXM

# local stores uploads on the development machine; cloudinary stores uploads in Cloudinary.
app.storage.mode=cloudinary
app.storage.public-url=http://localhost:8000/canim_ecommerce/uploads

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=3s
# Giỏ hàng vẫn chạy nếu Redis tắt (cache best-effort qua CartRedisCache)

order.pending-expiration-hours=24
order.auto-cancel-fixed-delay-ms=300000

# sandbox = cổng test | production = tiền thật (cần merchant + URL HTTPS công khai cho IPN)
