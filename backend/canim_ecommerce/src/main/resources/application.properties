payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay-return}
payment.vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8000/canim_ecommerce/payments/vnpay/ipn}

payment.momo.enabled=true
