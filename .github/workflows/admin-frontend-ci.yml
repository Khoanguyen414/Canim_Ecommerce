name: Admin Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - "admin-frontend/**"
      - ".github/workflows/admin-frontend-ci.yml"
  pull_request:
    paths:
      - "admin-frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: http://localhost:8080/canim_ecommerce
      VITE_STOREFRONT_URL: http://localhost:5173
    defaults:
      run:
        working-directory: admin-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
